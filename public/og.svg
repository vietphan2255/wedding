<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2" />
      <stop offset="55%" stop-color="#F4E4E1" />
      <stop offset="100%" stop-color="#E6D7CF" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Decorative border -->
  <rect
    x="40"
    y="40"
    width="1120"
    height="550"
    fill="none"
    stroke="#B8C5A6"
    stroke-width="1.5"
    rx="8"
  />
  <rect
    x="58"
    y="58"
    width="1084"
    height="514"
    fill="none"
    stroke="#B8C5A6"
    stroke-opacity="0.5"
    stroke-width="0.75"
    rx="4"
  />

  <!-- Eyebrow -->
  <text
    x="600"
    y="180"
    font-family="'Inter', sans-serif"
    font-size="22"
    letter-spacing="14"
    fill="#8B7355"
    text-anchor="middle"
    font-weight="500"
  >
    SAVE THE DATE
  </text>

  <!-- Couple names -->
  <text
    x="600"
    y="330"
    font-family="'Playfair Display', 'Times New Roman', serif"
    font-size="148"
    fill="#3F2E2A"
    text-anchor="middle"
    font-style="italic"
  >
    Viet
  </text>
  <text
    x="600"
    y="395"
    font-family="cursive"
    font-size="76"
    fill="#B8C5A6"
    text-anchor="middle"
  >
    &amp;
  </text>
  <text
    x="600"
    y="510"
    font-family="'Playfair Display', 'Times New Roman', serif"
    font-size="148"
    fill="#3F2E2A"
    text-anchor="middle"
    font-style="italic"
  >
    Nguyen
  </text>

  <!-- Dates -->
  <text
    x="600"
    y="568"
    font-family="'Inter', sans-serif"
    font-size="22"
    letter-spacing="6"
    fill="#8B7355"
    text-anchor="middle"
  >
    26.07.2026  ·  02.08.2026
  </text>

  <!-- Side ornaments -->
  <g stroke="#B8C5A6" stroke-width="1" fill="none">
    <path d="M 130 290 Q 220 270 290 290" />
    <path d="M 910 290 Q 980 270 1070 290" />
    <circle cx="290" cy="290" r="3" fill="#B8C5A6" />
    <circle cx="910" cy="290" r="3" fill="#B8C5A6" />
  </g>
</svg>
